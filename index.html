<!DOCTYPE html>
<html>
<head>
    <title>DormGuard Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-6">🛡️ DormGuard Real-Time Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-gray-800 p-6 rounded-lg border-l-8 border-green-500" id="status-card">
            <h2 class="text-xl">System Status</h2>
            <p id="status-text" class="text-4xl font-black text-green-500">SAFE</p>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg md:col-span-2">
            <h2 class="text-xl mb-4">Live Temperature Feed</h2>
            <canvas id="tempChart" height="100"></canvas>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h2 class="text-xl mb-4">Access Logs</h2>
            <ul id="log-list" class="text-sm space-y-2 max-h-64 overflow-y-auto"></ul>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h2 class="text-xl mb-4">Command Center</h2>
            <button onclick="resetSystem()" class="bg-red-600 hover:bg-red-700 p-3 rounded w-full font-bold">
                RESET ALARM SYSTEM
            </button>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:8080');
        
        // Inisialisasi Chart.js
        const ctx = document.getElementById('tempChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Temp (°C)', data: [], borderColor: '#3b82f6' }] }
        });

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Logika Update UI Berdasarkan Event
            if (data.event === 'SENSOR_UPDATE') {
                // Update Grafik
                chart.data.labels.push(new Date().toLocaleTimeString());
                chart.data.datasets[0].data.push(data.temperature);
                if (chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.update();
            }

            if (data.event === 'SYSTEM_ALERT') {
                const isEmergency = data.message.includes('BAHAYA');
                document.getElementById('status-text').innerText = isEmergency ? 'EMERGENCY' : 'SAFE';
                document.getElementById('status-card').style.borderColor = isEmergency ? 'red' : 'green';
                alert(data.message); // FITUR 3: Server-Initiated Alert
            }

            if (data.event === 'ACCESS_LOG') {
                const li = document.createElement('li');
                li.innerText = `[${new Date().toLocaleTimeString()}] ${data.message} - ${data.status}`;
                li.className = data.status === 'SUCCESS' ? 'text-green-400' : 'text-red-400';
                document.getElementById('log-list').prepend(li);
            }
        };

        // FITUR 4: Kirim Instruksi ke Backend
        function resetSystem() {
            ws.send(JSON.stringify({ type: 'RESET_SYSTEM' }));
        }
    </script>
</body>
</html>
